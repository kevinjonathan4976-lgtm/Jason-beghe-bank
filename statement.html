<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Statement</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="loadStatement()">

<div class="container">

    <div class="bank-card">

        <h2>Account Statement</h2>

        <p id="statementName"></p>
        <p id="statementBalance"></p>

        <hr>

        <table class="history-table">

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
            </thead>

            <tbody id="statementTable">
            </tbody>

        </table>

        <br>

        <button onclick="downloadStatement()">
            Download PDF Statement
        </button>

        <br><br>

        <a href="dashboard.html" class="btn">
            Back To Dashboard
        </a>

    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
